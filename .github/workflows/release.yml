name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Import Certificate
        run: |
          set -euo pipefail
          echo "${{ secrets.CERTIFICATE_P12_BASE64 }}" | base64 --decode > cert.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import cert.p12 \
            -k build.keychain \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          rm cert.p12

      - name: Build (release)
        run: swift build --configuration release

      - name: Assemble .app bundle
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/ClaudeTerminal.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp .build/release/ClaudeTerminal "$APP/Contents/MacOS/"
          cp .build/release/ClaudeTerminalHelper "$APP/Contents/MacOS/"
          cp ClaudeTerminal/App/Info.plist "$APP/Contents/"

      - name: Sign (helper → app)
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/ClaudeTerminal.app"

          # Sign helper first — required before signing the containing bundle
          codesign \
            --sign "Developer ID Application" \
            --entitlements helper.entitlements \
            --options runtime \
            --timestamp \
            --force \
            "$APP/Contents/MacOS/ClaudeTerminalHelper"

          # Sign app bundle last
          codesign \
            --sign "Developer ID Application" \
            --entitlements app.entitlements \
            --options runtime \
            --timestamp \
            --force \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Create and Sign DMG
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/ClaudeTerminal.app"
          DMG="$RUNNER_TEMP/ClaudeTerminal-${{ github.ref_name }}.dmg"

          hdiutil create \
            -volname "Claude Terminal" \
            -srcfolder "$APP" \
            -ov -format UDZO "$DMG"

          codesign \
            --sign "Developer ID Application" \
            --timestamp \
            "$DMG"

      - name: Notarize
        run: |
          set -euo pipefail
          DMG="$RUNNER_TEMP/ClaudeTerminal-${{ github.ref_name }}.dmg"

          xcrun notarytool submit "$DMG" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.NOTARIZATION_PASSWORD }}" \
            --team-id "${{ secrets.TEAM_ID }}" \
            --wait

          xcrun stapler staple "$DMG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: ${{ runner.temp }}/ClaudeTerminal-${{ github.ref_name }}.dmg
          generate_release_notes: true
