name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Import Certificate
        run: |
          set -euo pipefail
          echo "${{ secrets.CERTIFICATE_P12_BASE64 }}" | base64 --decode > cert.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import cert.p12 \
            -k build.keychain \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          rm cert.p12

      - name: Build (release)
        run: swift build --configuration release

      - name: Assemble .app bundle
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/ClaudeTerminal.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp .build/release/ClaudeTerminal "$APP/Contents/MacOS/"
          cp .build/release/ClaudeTerminalHelper "$APP/Contents/MacOS/"
          cp ClaudeTerminal/App/Info.plist "$APP/Contents/"

      - name: Embed Sparkle.framework
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/ClaudeTerminal.app"
          SPARKLE_FW=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/macos-arm64_x86_64/Sparkle.framework"
          mkdir -p "$APP/Contents/Frameworks"
          cp -R "$SPARKLE_FW" "$APP/Contents/Frameworks/"

      - name: Sign (Sparkle helpers → Sparkle.framework → helper → app)
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/ClaudeTerminal.app"
          SPARKLE_FW="$APP/Contents/Frameworks/Sparkle.framework"

          # Sign Sparkle nested executables first
          for nested in Autoupdate Updater.app; do
            target="$SPARKLE_FW/$nested"
            if [ -e "$target" ]; then
              codesign \
                --sign "Developer ID Application" \
                --options runtime \
                --timestamp \
                --force \
                "$target"
            fi
          done

          # Sign Sparkle.framework
          codesign \
            --sign "Developer ID Application" \
            --options runtime \
            --timestamp \
            --force \
            "$SPARKLE_FW"

          # Sign helper — required before signing the containing bundle
          codesign \
            --sign "Developer ID Application" \
            --entitlements helper.entitlements \
            --options runtime \
            --timestamp \
            --force \
            "$APP/Contents/MacOS/ClaudeTerminalHelper"

          # Sign app bundle last
          codesign \
            --sign "Developer ID Application" \
            --entitlements app.entitlements \
            --options runtime \
            --timestamp \
            --force \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Create and Sign DMG
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/ClaudeTerminal.app"
          DMG="$RUNNER_TEMP/ClaudeTerminal-${{ github.ref_name }}.dmg"

          hdiutil create \
            -volname "Claude Terminal" \
            -srcfolder "$APP" \
            -ov -format UDZO "$DMG"

          codesign \
            --sign "Developer ID Application" \
            --timestamp \
            "$DMG"

      - name: Notarize
        run: |
          set -euo pipefail
          DMG="$RUNNER_TEMP/ClaudeTerminal-${{ github.ref_name }}.dmg"

          xcrun notarytool submit "$DMG" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.NOTARIZATION_PASSWORD }}" \
            --team-id "${{ secrets.TEAM_ID }}" \
            --wait

          xcrun stapler staple "$DMG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: ${{ runner.temp }}/ClaudeTerminal-${{ github.ref_name }}.dmg
          generate_release_notes: true

      - name: Update appcast.xml
        run: |
          set -euo pipefail
          DMG="$RUNNER_TEMP/ClaudeTerminal-${{ github.ref_name }}.dmg"
          SIGN_UPDATE=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/macos-arm64_x86_64/Sparkle.framework/Versions/B/Resources/sign_update"
          VERSION="${{ github.ref_name }}"
          SHORT_VERSION="${VERSION#v}"
          DMG_URL="https://github.com/rmolines/claude-terminal/releases/download/${VERSION}/ClaudeTerminal-${VERSION}.dmg"

          # Write private key to temp file
          echo "${{ secrets.SPARKLE_PRIVATE_KEY }}" > /tmp/sparkle_key
          chmod 600 /tmp/sparkle_key

          # Get EdDSA signature
          ED_SIG=$("$SIGN_UPDATE" "$DMG" -f /tmp/sparkle_key | grep -o 'edSignature="[^"]*"' | cut -d'"' -f2)
          DMG_SIZE=$(stat -f%z "$DMG")
          rm -f /tmp/sparkle_key

          # Insert new item into appcast.xml before </channel>
          # Shell variables are expanded before Python sees the script (unquoted heredoc).
          python3 - "$SHORT_VERSION" "$DMG_URL" "$DMG_SIZE" "$ED_SIG" <<'PYEOF'
          import sys, datetime
          short_ver, dmg_url, dmg_size, ed_sig = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          pub_date = datetime.datetime.utcnow().strftime('%a, %d %b %Y %H:%M:%S +0000')
          new_item = (
              "        <item>\n"
              f"            <title>Claude Terminal {short_ver}</title>\n"
              f"            <pubDate>{pub_date}</pubDate>\n"
              f"            <sparkle:version>{short_ver}</sparkle:version>\n"
              f"            <sparkle:shortVersionString>{short_ver}</sparkle:shortVersionString>\n"
              "            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n"
              f'            <enclosure url="{dmg_url}" length="{dmg_size}" type="application/octet-stream" sparkle:edSignature="{ed_sig}"/>\n'
              "        </item>"
          )
          with open("appcast.xml", "r") as f:
              content = f.read()
          updated = content.replace("    </channel>", new_item + "\n    </channel>")
          with open("appcast.xml", "w") as f:
              f.write(updated)
          PYEOF

          # Commit and push appcast.xml to main
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git fetch origin main
          git checkout main
          git add appcast.xml
          git commit -m "chore: update appcast.xml for $VERSION"
          git push origin main
